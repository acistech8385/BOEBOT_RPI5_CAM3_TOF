# ============================================================
# BOEBOT RPi5 Hardware Configuration
# ============================================================
# Robot type
robot.type=boebot

# PCA9685 Servo HAT - I2C settings
servo.hat.i2c.bus=1
servo.hat.i2c.address=0x40
servo.frequency.hz=50

# Wheel servos - Parallax continuous rotation servos
right.wheel.channel=14
left.wheel.channel=15

# Gripper servo - MG90S on Servo HAT channel 0
gripper.enabled=true
gripper.channel=0

# Camera Module 3 on CAM/DISP 0
camera.module3.enabled=true
camera.module3.port=0

# ArduCam ToF Camera on CAM/DISP 1
tof.enabled=true
tof.port=1

# Line sensors (SumoBot) - Parallax QTI RC-time sensors (BCM GPIO numbers)
# Right QTI signal = GPIO5 (physical pin 29), Left QTI signal = GPIO6 (pin 31).
# The W (power) pin of each QTI is assumed tied to permanent 5V.
line.sensor.right.gpio=5
line.sensor.left.gpio=6
# RC-time charge above this many microseconds = BLACK line (tune per surface).
line.sensor.threshold.us=1500
